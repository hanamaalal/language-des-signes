<nav class="navbar">
  <div class="navbar-left">
    <h2 class="logo">Signéo</h2>
  </div>

  <div class="navbar-right">
    <button class="btn-outline" routerLink="/signin">Se connecter</button>
    <button class="btn-filled" routerLink="/signup">S’inscrire</button>
  </div>
</nav>

<div class="signup-container">
  <!-- Fond avec image -->
  <div class="background-image"></div>

  <!-- Carte de formulaire -->
  <div class="signup-card">
    <h2>Créer un Compte</h2>

    <form (ngSubmit)="onSignUp()" class="signup-form">
      <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="Votre nom complet" required />
      <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="votre@email.com" required />
      <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Choisissez un mot de passe" required />
      <button type="submit">Créer le Compte</button>
    </form>

    <p class="auth-link">Déjà un compte ? <a routerLink="/signin">Se connecter</a></p>
  </div>
</div>

<footer class="footer">
  <p>© 2025 Signéo — Tous droits réservés</p>
  <p>Contact : <a href="mailto:support@signeo.com">support@signeo.com</a></p>
</footer>
